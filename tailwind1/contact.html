<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Akilan Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[url('https://images.unsplash.com/photo-1498050108023-c5249f4df085')] bg-cover bg-center bg-fixed text-white">

<div class="fixed inset-0 bg-black/70 -z-10"></div>

<header class="sticky top-0 bg-slate-900/95 px-10 py-4">

  <nav class="flex justify-between items-center">

    <h1 class="text-2xl font-bold">Akilan Portfolio</h1>

    <ul class="flex gap-6">
      <li><a href="index.html" class="hover:text-sky-400">Home</a></li>
      <li><a href="about.html" class="hover:text-sky-400">About</a></li>
      <li><a href="skills.html" class="hover:text-sky-400">Skills</a></li>
      <li><a href="project.html" class="hover:text-sky-400">Projects</a></li>
    </ul>

  </nav>

</header>

<section class="max-w-5xl mx-auto p-10">

  <div class="bg-white/10 backdrop-blur-md rounded-3xl p-10">

    <h2 class="text-4xl text-center font-bold mb-10 text-sky-400">
      Contact Me
    </h2>

    <form class="grid gap-6">

      <input type="text"
      placeholder="Your Name"
      class="p-4 rounded-xl text-black outline-none">

      <input type="email"
      placeholder="Your Email"
      class="p-4 rounded-xl text-black outline-none">

      <input type="text"
      placeholder="Subject"
      class="p-4 rounded-xl text-black outline-none">

      <textarea rows="6"
      placeholder="Your Message"
      class="p-4 rounded-xl text-black outline-none"></textarea>

      <button class="bg-sky-500 hover:scale-105 transition rounded-xl p-4 font-semibold">
        Send Message
      </button>

    </form>

    <!-- Future Space -->
    <div class="mt-10 border border-dashed border-white/30 rounded-2xl p-6">

      <h3 class="text-2xl font-semibold text-sky-400 mb-4">
        Add More Contact Details
      </h3>

      <p class="text-gray-400">
        Add LinkedIn, GitHub, Instagram, phone number,
        location, Google Maps and social icons later.
      </p>

    </div>

  </div>

</section>

</body>
</html>
